# One-command spin-up for collaborators (native local dev with psql + uv + npm
# remains the primary workflow). Default `docker compose up` starts postgres +
# core + admin. Channel gateways need credentials, so each is behind a profile:
#   docker compose --profile gateway up    # both gateways
#   docker compose --profile whatsapp up   # just WhatsApp (needs ./whatsapp/.env)
#   docker compose --profile telegram up   # just Telegram (needs ./telegram/.env)
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: chasqui
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./core/config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chasqui"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Media storage (ADR-003) — local S3-compatible bucket, zero setup.
  # RustFS (Apache-2.0; MinIO was archived/relicensed in 2026 — see ADR-003).
  # Console at http://localhost:9001 (chasqui / chasqui-secret).
  # Dev/test only: production points STORAGE_* at a managed bucket (S3/R2/B2).
  storage:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: chasqui
      RUSTFS_SECRET_KEY: chasqui-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - storagedata:/data

  # One-shot: creates the media bucket so `up` is all collaborators need
  # (retries until the storage service accepts connections).
  storage-init:
    image: amazon/aws-cli
    depends_on:
      - storage
    environment:
      AWS_ACCESS_KEY_ID: chasqui
      AWS_SECRET_ACCESS_KEY: chasqui-secret
      AWS_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      until aws --endpoint-url http://storage:9000 s3api head-bucket --bucket chasqui-media 2>/dev/null ||
            aws --endpoint-url http://storage:9000 s3 mb s3://chasqui-media; do sleep 2; done;
      echo bucket ready"

  core:
    build: ./core
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chasqui
      JWT_SECRET_KEY: dev-secret-change-me
      INTERNAL_API_KEY: devkey
      CORS_ORIGINS: "http://localhost:3000"
      # LLM/embeddings — export GOOGLE_API_KEY on the host before `up`
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Media storage (ADR-003): core uploads via the docker network, but
      # presigned URLs must be browser-reachable → public endpoint override.
      STORAGE_ENDPOINT_URL: "http://storage:9000"
      STORAGE_PUBLIC_ENDPOINT_URL: "http://localhost:9000"
      STORAGE_BUCKET: chasqui-media
      STORAGE_ACCESS_KEY: chasqui
      STORAGE_SECRET_KEY: chasqui-secret
      # Outbound seam (ADR-004): where operator replies go. Only resolvable
      # when the matching gateway profile is up; sends fail with a clear error
      # otherwise.
      CHANNEL_WHATSAPP_SEND_URL: "http://whatsapp:8000/send"
      CHANNEL_TELEGRAM_SEND_URL: "http://telegram:8001/send"
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8090"
    ports:
      - "8090:8090"

  admin:
    build:
      context: ./admin
      args:
        VITE_API_BASE_URL: "http://localhost:8090"
    depends_on:
      - core
    ports:
      - "3000:3000"

  whatsapp:
    build: ./whatsapp
    profiles: ["gateway", "whatsapp"]
    depends_on:
      - core
    env_file:
      - ./whatsapp/.env
    environment:
      CORE_URL: "http://core:8090"
      INTERNAL_API_KEY: devkey
    ports:
      - "8000:8000"

  telegram:
    build: ./telegram
    profiles: ["gateway", "telegram"]
    depends_on:
      - core
    env_file:
      - ./telegram/.env
    environment:
      CORE_URL: "http://core:8090"
      INTERNAL_API_KEY: devkey
    ports:
      - "8001:8001"

volumes:
  pgdata:
  storagedata:
