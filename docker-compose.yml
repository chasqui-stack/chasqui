# One-command spin-up for collaborators (native local dev with psql + uv + npm
# remains the primary workflow). Default `docker compose up` starts postgres +
# core + admin. The WhatsApp gateway needs Meta credentials, so it's behind the
# `gateway` profile: `docker compose --profile gateway up` (requires ./whatsapp/.env).
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: chasqui
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./core/config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chasqui"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Media storage (ADR-003) — local S3-compatible bucket, zero setup.
  # Console at http://localhost:9001 (chasqui / chasqui-secret).
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: chasqui
      MINIO_ROOT_PASSWORD: chasqui-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: creates the media bucket so `up` is all collaborators need.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 chasqui chasqui-secret &&
      mc mb --ignore-existing local/chasqui-media"

  core:
    build: ./core
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chasqui
      JWT_SECRET_KEY: dev-secret-change-me
      INTERNAL_API_KEY: devkey
      CORS_ORIGINS: "http://localhost:3000"
      # LLM/embeddings — export GOOGLE_API_KEY on the host before `up`
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Media storage (ADR-003): core uploads via the docker network, but
      # presigned URLs must be browser-reachable → public endpoint override.
      STORAGE_ENDPOINT_URL: "http://minio:9000"
      STORAGE_PUBLIC_ENDPOINT_URL: "http://localhost:9000"
      STORAGE_BUCKET: chasqui-media
      STORAGE_ACCESS_KEY: chasqui
      STORAGE_SECRET_KEY: chasqui-secret
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8090"
    ports:
      - "8090:8090"

  admin:
    build:
      context: ./admin
      args:
        VITE_API_BASE_URL: "http://localhost:8090"
    depends_on:
      - core
    ports:
      - "3000:3000"

  whatsapp:
    build: ./whatsapp
    profiles: ["gateway"]
    depends_on:
      - core
    env_file:
      - ./whatsapp/.env
    environment:
      CORE_URL: "http://core:8090"
      INTERNAL_API_KEY: devkey
    ports:
      - "8000:8000"

volumes:
  pgdata:
  miniodata:
